<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🎉 Sorpresa para Raúl 🎁</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#84fab0,#8fd3f4);
text-align:center;
padding:20px;
margin:0;
}

.card{
background:white;
max-width:650px;
margin:auto;
padding:30px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:12px;
background:#ff7b54;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#ff5722;
}

img{
width:100%;
border-radius:15px;
margin-top:20px;
}

h1,h2{
color:#333;
}

</style>
</head>

<body>

<div class="card" id="quiz">

<h1>🎉 Los 60 de Raúl 🎉</h1>

<p>😏 Responde estas preguntas y descubrí tu regalo sorpresa...</p>

<h2 id="pregunta"></h2>

<div id="respuestas"></div>

</div>

<script>

const preguntas = [

{
texto:"😎 ¿Qué plan te atrae más?",
opciones:[
{texto:"🏔️ Algo aventurero y único",puntos:1},
{texto:"🌊 Algo relajado y natural",puntos:0}
]
},

{
texto:"🧊 ¿Cómo te llevás con el frío?",
opciones:[
{texto:"💪 Me encanta",puntos:1},
{texto:"☀️ Prefiero clima suave",puntos:0}
]
},

{
texto:"📸 ¿Qué foto subirías primero?",
opciones:[
{texto:"❄️ Paisajes increíbles",puntos:1},
{texto:"🐋 Animales y mar",puntos:0}
]
},

{
texto:"🥾 Elegí una actividad:",
opciones:[
{texto:"🚢 Explorar lugares épicos",puntos:1},
{texto:"🌿 Relajarme y disfrutar",puntos:0}
]
},

{
texto:"😏 Última pregunta...",
opciones:[
{texto:"🌎 Quiero una experiencia inolvidable",puntos:1},
{texto:"🐳 Quiero naturaleza y tranquilidad",puntos:0}
]
}

];

let actual = 0;
let puntos = 0;

function cargarPregunta(){

document.getElementById("pregunta").innerHTML =
preguntas[actual].texto;

const respuestas =
document.getElementById("respuestas");

respuestas.innerHTML = "";

preguntas[actual].opciones.forEach(opcion=>{

const boton = document.createElement("button");

boton.innerHTML = opcion.texto;

boton.onclick = ()=>{

puntos += opcion.puntos;

actual++;

if(actual < preguntas.length){

cargarPregunta();

}else{

mostrarResultado();

}

};

respuestas.appendChild(boton);

});

}

function mostrarResultado(){

const quiz = document.getElementById("quiz");

if(puntos >= 3){

quiz.innerHTML = `

<h1>🎉 RAÚL... TE VAS A USHUAIA ❄️</h1>

<img src="https://images.unsplash.com/photo-1580674285054-bed31e145f59?q=80&w=1200&auto=format&fit=crop">

<h2>🎁 ESTE ES TU REGALO 🎁</h2>

<p style="font-size:22px;">
🌎 Aventura en el fin del mundo 😎
</p>

<p style="font-size:18px;">
🚢 Navegación increíble<br><br>
🏔️ Paisajes únicos<br><br>
❄️ Una experiencia inolvidable
</p>

<p style="font-size:22px;">
❤️ Con amor, de parte de tus hijos ❤️
</p>

`;

}else{

quiz.innerHTML = `

<h1>🎉 RAÚL... TE VAS A PUERTO MADRYN 🌊</h1>

<img src="https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?q=80&w=1200&auto=format&fit=crop">

<h2>🎁 ESTE ES TU REGALO 🎁</h2>

<p style="font-size:22px;">
🐋 Naturaleza, mar y relax 😎
</p>

<p style="font-size:18px;">
🐳 Ballenas increíbles<br><br>
🌊 Paisajes únicos<br><br>
☀️ Un viaje inolvidable
</p>

<p style="font-size:22px;">
❤️ Con amor, de parte de tus hijos ❤️
</p>

`;

}

}

cargarPregunta();

</script>

</body>
</html>
